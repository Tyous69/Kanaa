<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var store = localStorage.getItem("kanaa-store");
          if (store) {
            var parsed = JSON.parse(store);
            var dark = parsed?.state?.darkMode;
            if (dark === true || dark === undefined) {
              document.documentElement.classList.add("dark");
            }
          } else {
            // Pas de store = première visite = dark par défaut
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
        import("@react-grab/mcp/client");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kanaa! — Master Japanese Hiragana & Katakana" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Kanaa!</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
